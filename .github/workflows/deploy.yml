name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      frontend_bucket: ${{ steps.tf-output.outputs.frontend_bucket }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve
        env:
          TF_VAR_frontend_origin: "https://s3.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.FRONTEND_BUCKET }}"

      - name: Capture Terraform outputs
        id: tf-output
        working-directory: infra
        run: |
          FRONTEND_BUCKET=$(terraform output -raw frontend_bucket 2>/dev/null || echo "${{ vars.FRONTEND_BUCKET }}")
          echo "frontend_bucket=${FRONTEND_BUCKET}" >> "$GITHUB_OUTPUT"

  deploy-lambdas:
    name: Deploy Lambdas
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Package and deploy Lambda functions
        run: |
          mkdir -p dist

          (cd lambdas/get_upload_url    && zip -r ../../dist/get_upload_url.zip .)
          (cd lambdas/process_image     && zip -r ../../dist/process_image.zip .)
          (cd lambdas/get_moderation_result && zip -r ../../dist/get_moderation_result.zip .)

          deploy_lambda() {
            local fn_name="$1"
            local zip_path="$2"
            aws lambda update-function-code \
              --function-name "$fn_name" \
              --zip-file "fileb://${zip_path}" \
              --no-cli-pager
            aws lambda wait function-updated \
              --function-name "$fn_name"
            echo "Deployed ${fn_name}"
          }

          deploy_lambda "${{ vars.LAMBDA_GET_UPLOAD_URL }}"  dist/get_upload_url.zip
          deploy_lambda "${{ vars.LAMBDA_PROCESS_IMAGE }}"   dist/process_image.zip
          deploy_lambda "${{ vars.LAMBDA_GET_RESULT }}"      dist/get_moderation_result.zip

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync frontend to S3
        run: |
          aws s3 sync web/ "s3://${{ needs.terraform-apply.outputs.frontend_bucket }}/" \
            --delete \
            --no-cli-pager
          echo "Frontend deployed to s3://${{ needs.terraform-apply.outputs.frontend_bucket }}/"
