<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin dashboard for reviewing and actioning flagged or blocked content.">
    <title>Content Moderation — Admin</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232563EB'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui%2Csans-serif' font-weight='700' font-size='13' fill='white'%3ECM%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">CM</div>
            <div class="navbar-title">
                <span class="navbar-name">Content Moderation</span>
                <span class="navbar-sub">Admin Dashboard</span>
            </div>
        </div>
        <div class="navbar-right">
            <a href="/frontend/" class="nav-link">Upload</a>
            <a href="/frontend/admin/" class="nav-link" aria-current="page">Admin</a>
            <button class="nav-btn" onclick="logout()">Sign out</button>
        </div>
    </nav>

    <main class="main">

        <div class="page-header">
            <h1>Moderation Results</h1>
            <p>Review and action flagged or blocked content.</p>
        </div>

        <div class="toolbar">
            <button class="chip active-all" data-status=""         onclick="setFilter(this, '')">All</button>
            <button class="chip"            data-status="FLAGGED"  onclick="setFilter(this, 'FLAGGED')">Flagged</button>
            <button class="chip"            data-status="BLOCKED"  onclick="setFilter(this, 'BLOCKED')">Blocked</button>
            <button class="chip"            data-status="APPROVED" onclick="setFilter(this, 'APPROVED')">Approved</button>
            <button class="btn"             onclick="exportCSV()">Export CSV</button>
            <button class="btn btn-refresh" onclick="loadResults()">&#8635; Refresh</button>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <div class="table-card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Image Key</th>
                            <th>Status</th>
                            <th>Timestamp</th>
                            <th>Manual Decision</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="auth.js"></script>
    <script src="admin.js"></script>
</body>
</html>
