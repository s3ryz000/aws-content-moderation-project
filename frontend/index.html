<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AWS Content Moderation System — powered by Amazon Rekognition">
    <title>Content Moderation — AWS Prototype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">CM</div>
            <div class="navbar-title">
                <span class="navbar-name">Content Moderation</span>
                <span class="navbar-sub">AWS Prototype</span>
            </div>
        </div>
        <div class="navbar-right">
            <div class="status-pill" id="statusPill">
                <span class="status-dot"></span>
                <span id="statusText">Checking...</span>
            </div>
        </div>
    </nav>

    <main class="main">

        <div class="page-header">
            <h1>Image Content Moderation</h1>
            <p>Powered by Amazon Rekognition</p>
        </div>

        <div class="card" id="uploadCard">

            <div class="upload-icon-wrap">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>

            <h2 class="card-title">Upload an Image</h2>
            <p class="card-subtitle">Drag &amp; drop your image here or click to browse</p>

            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" accept="image/*">
                <div class="format-badges">
                    <span>JPG</span>
                    <span>PNG</span>
                    <span>GIF</span>
                    <span>WEBP</span>
                </div>
                <p class="drop-hint">Max file size: 10 MB</p>
            </div>

            <div class="alert alert-error hidden" id="errorArea">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorMessage"></span>
            </div>

            <div class="preview-strip hidden" id="previewArea">
                <img id="previewImage" src="" alt="Selected image preview">
                <div class="preview-info">
                    <p class="preview-name" id="fileName"></p>
                    <p class="preview-size" id="fileSize"></p>
                </div>
                <button class="clear-btn" id="clearBtn" title="Remove file">&#x2715;</button>
            </div>

            <div class="progress-wrap hidden" id="progressWrap">
                <div class="progress-bar" id="progressBar" style="width:0%"></div>
                <span class="progress-label" id="progressLabel">0%</span>
            </div>

            <button class="btn btn-primary" id="uploadBtn" disabled>Upload Image</button>

        </div>

        <div class="card result-card hidden" id="resultSection">
            <div class="result-header">
                <h2>Moderation Result</h2>
                <span class="result-badge" id="resultBadge"></span>
            </div>
            <ul class="steps" id="workflowSteps"></ul>
            <button class="btn btn-outline" id="resetBtn">Upload Another Image</button>
        </div>

    </main>

    <footer class="footer">
        CC Final Project &mdash; AWS Content Moderation Prototype
    </footer>

    <script src="app.js"></script>
</body>
</html>
